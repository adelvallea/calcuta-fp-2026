<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <rect width="240" height="240" fill="white"/>

  <!-- ── RAMAS DE LAUREL ─────────────────────────────────── -->
  <!-- Rama IZQUIERDA -->
  <g fill="#1C3B28" stroke="none">
    <!-- tallo -->
    <path d="M118,188 Q88,170 55,128 Q40,108 38,88" stroke="#1C3B28" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- hojas superiores (arriba) -->
    <ellipse cx="95"  cy="44"  rx="13" ry="5.5" transform="rotate(-80,95,44)"/>
    <ellipse cx="80"  cy="52"  rx="13" ry="5.5" transform="rotate(-67,80,52)"/>
    <ellipse cx="67"  cy="63"  rx="13" ry="5.5" transform="rotate(-55,67,63)"/>
    <ellipse cx="56"  cy="77"  rx="13" ry="5.5" transform="rotate(-42,56,77)"/>
    <ellipse cx="48"  cy="93"  rx="13" ry="5.5" transform="rotate(-28,48,93)"/>
    <ellipse cx="43"  cy="110" rx="13" ry="5.5" transform="rotate(-15,43,110)"/>
    <ellipse cx="42"  cy="127" rx="13" ry="5.5" transform="rotate(-2,42,127)"/>
    <!-- hojas inferiores (abajo) -->
    <ellipse cx="46"  cy="144" rx="13" ry="5.5" transform="rotate(12,46,144)"/>
    <ellipse cx="55"  cy="159" rx="13" ry="5.5" transform="rotate(25,55,159)"/>
    <ellipse cx="67"  cy="171" rx="12" ry="5"   transform="rotate(38,67,171)"/>
    <ellipse cx="82"  cy="180" rx="12" ry="5"   transform="rotate(50,82,180)"/>
    <ellipse cx="98"  cy="186" rx="11" ry="4.5" transform="rotate(62,98,186)"/>
  </g>

  <!-- Rama DERECHA (espejo respecto a x=120) -->
  <g fill="#1C3B28" stroke="none" transform="translate(240,0) scale(-1,1)">
    <path d="M118,188 Q88,170 55,128 Q40,108 38,88" stroke="#1C3B28" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="95"  cy="44"  rx="13" ry="5.5" transform="rotate(-80,95,44)"/>
    <ellipse cx="80"  cy="52"  rx="13" ry="5.5" transform="rotate(-67,80,52)"/>
    <ellipse cx="67"  cy="63"  rx="13" ry="5.5" transform="rotate(-55,67,63)"/>
    <ellipse cx="56"  cy="77"  rx="13" ry="5.5" transform="rotate(-42,56,77)"/>
    <ellipse cx="48"  cy="93"  rx="13" ry="5.5" transform="rotate(-28,48,93)"/>
    <ellipse cx="43"  cy="110" rx="13" ry="5.5" transform="rotate(-15,43,110)"/>
    <ellipse cx="42"  cy="127" rx="13" ry="5.5" transform="rotate(-2,42,127)"/>
    <ellipse cx="46"  cy="144" rx="13" ry="5.5" transform="rotate(12,46,144)"/>
    <ellipse cx="55"  cy="159" rx="13" ry="5.5" transform="rotate(25,55,159)"/>
    <ellipse cx="67"  cy="171" rx="12" ry="5"   transform="rotate(38,67,171)"/>
    <ellipse cx="82"  cy="180" rx="12" ry="5"   transform="rotate(50,82,180)"/>
    <ellipse cx="98"  cy="186" rx="11" ry="4.5" transform="rotate(62,98,186)"/>
  </g>

  <!-- ── LETRAS FP ────────────────────────────────────────── -->
  <!--
    El logo original muestra una F y una P que comparten el palo vertical.
    Dibujamos las letras manualmente para que coincidan con el original.
  -->

  <!-- Palo vertical compartido F+P -->
  <rect x="103" y="62" width="9" height="112" rx="1" fill="#C9A227"/>

  <!-- F: barra superior -->
  <rect x="103" y="62" width="38" height="9" rx="1" fill="#C9A227"/>
  <!-- F: barra media -->
  <rect x="103" y="106" width="30" height="8" rx="1" fill="#C9A227"/>

  <!-- P: arco superior (semicírculo) -->
  <path d="M112,71 Q152,71 152,95 Q152,119 112,119" stroke="#C9A227" stroke-width="9" fill="none" stroke-linecap="round"/>

</svg>
